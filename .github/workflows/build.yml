name: Build & Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v5.0.0
        with:
          version: 10.33.0

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version-file: '.nvmrc'
          cache: 'pnpm'

      - uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          path: vendor
          key: vendor-${{ hashFiles('artifacts.json','artifacts.lock.json') }}

      - run: pnpm install --frozen-lockfile

      - run: pnpm test
      # `pnpm run build` invokes the `prebuild` hook (fetch-artifacts,
      # stage-vendor, verify-palette) then the Eleventy build, so we don't
      # run those scripts explicitly anymore.
      - run: pnpm run build
        env:
          NODE_ENV: production
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: _site

  deploy:
    needs: build
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - id: deploy
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0

      - name: Post-deploy health check
        run: |
          urls=(
            "https://lowgravitas.com/"
            "https://lowgravitas.com/zen-theme/"
            "https://lowgravitas.com/symbol-font/"
            "https://lowgravitas.com/symbol-font/browser/"
            "https://lowgravitas.com/blog/"
            "https://lowgravitas.com/blog/feed.xml"
            "https://lowgravitas.com/sitemap.xml"
            "https://lowgravitas.com/low-gravitas-zen-theme/"
            "https://lowgravitas.com/low-gravitas-symbol-font/"
            "https://lowgravitas.com/low-gravitas-symbol-font/browser.html"
          )
          for url in "${urls[@]}"; do
            ok=false
            for attempt in 1 2 3 4 5; do
              code=$(curl -fsS -o /dev/null -w "%{http_code}" "$url" 2>/dev/null || echo "000")
              if echo "$code" | grep -qE '^(200|301|302)$'; then
                ok=true
                break
              fi
              sleep 20
            done
            if [ "$ok" = false ]; then
              echo "::error::$url failed after 5x20s retries (last code: $code)"
              exit 1
            fi
            echo "✓ $url ($code)"
          done
