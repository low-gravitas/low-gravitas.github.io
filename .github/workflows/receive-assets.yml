name: Receive assets

on:
  repository_dispatch:
    types: [update-zen-css, update-symbol-font]

permissions:
  contents: write

jobs:
  commit-assets:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Download zen CSS (theme repo dispatch)
        if: github.event.action == 'update-zen-css'
        run: |
          curl -sL -o low-gravitas-zen.css \
            "https://github.com/low-gravitas/low-gravitas-zen-theme/releases/download/${{ github.event.client_payload.version }}/low-gravitas-zen.css"
          curl -sL -o low-gravitas-common.css \
            "https://github.com/low-gravitas/low-gravitas-zen-theme/releases/download/${{ github.event.client_payload.version }}/low-gravitas-common.css"

      - name: Download symbol font (font repo dispatch)
        if: github.event.action == 'update-symbol-font'
        run: |
          curl -sL -o LowGravitasSymbols.ttf \
            "https://github.com/low-gravitas/low-gravitas-symbol-font/releases/download/${{ github.event.client_payload.version }}/LowGravitasSymbols.ttf"
          curl -sL -o low-gravitas-symbols.css \
            "https://github.com/low-gravitas/low-gravitas-symbol-font/releases/download/${{ github.event.client_payload.version }}/low-gravitas-symbols.css"

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update assets from ${{ github.event.action }} (${{ github.event.client_payload.version }})"
            git push
          fi
